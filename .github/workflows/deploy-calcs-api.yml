name: Deploy calcs-api-mcp to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'calcs-api-mcp/**'
      - '.github/workflows/deploy-calcs-api.yml'

concurrency:
  group: ${{ github.workflow }}-deploy
  cancel-in-progress: true

env:
  PROJECT_ID: staging-mcp-490021
  DOCKER_REPO_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_REPO_NAME: staging-mcp-490021/mcp-servers
  GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: '${{ env.DOCKER_REPO_REGISTRY }}'
          username: _json_key
          password: '${{ env.GOOGLE_APPLICATION_CREDENTIALS }}'

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: calcs-api-mcp
          push: true
          tags: |
            ${{ env.DOCKER_REPO_REGISTRY }}/${{ env.IMAGE_REPO_NAME }}/calcs-api-mcp:${{ github.sha }}
            ${{ env.DOCKER_REPO_REGISTRY }}/${{ env.IMAGE_REPO_NAME }}/calcs-api-mcp:latest

      - name: Set up Google Cloud auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ env.GOOGLE_APPLICATION_CREDENTIALS }}'

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: '${{ env.PROJECT_ID }}'
          service: calcs-api-mcp
          region: us-central1
          image: '${{ env.DOCKER_REPO_REGISTRY }}/${{ env.IMAGE_REPO_NAME }}/calcs-api-mcp:${{ github.sha }}'
          flags: >-
            --memory=512Mi
            --min-instances=0
            --max-instances=3
            --allow-unauthenticated
            --service-account=staging-calcs-api-mcp-server@staging-mcp-490021.iam.gserviceaccount.com
          env_vars: |
            MCP_BASE_URL=https://calcs-api-mcp-wtzr5w5khq-uc.a.run.app
            GOOGLE_CLOUD_PROJECT=staging-mcp-490021
          secrets: |
            AUTH0_PASSWORD=auth0-password:latest
            GOOGLE_CLIENT_ID=google-oauth-client-id:latest
            GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest

      - name: Show Cloud Run URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
